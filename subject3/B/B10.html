<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="c" width="400" height="200" style="border:1px solid"></canvas>
    <br>
    <button onclick="ctx.clearRect(0,0,c.width,c.height)">지우기</button>
    <button onclick="save()">저장</button>

    <script>
        const c = document.getElementById("c");
        const ctx = c.getContext("2d");

        let d = false;

        c.onmousedown = e => {
        d = true;
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
        };

        c.onmousemove = e => {
        if (!d) return;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        };

        c.onmouseup = c.onmouseleave = () => d = false;

        function save() {
            const a = document.createElement("a");
            a.href = c.toDataURL();
            a.download = "sign.png";
            a.click();
        }
    </script> 
</body>
</html>
